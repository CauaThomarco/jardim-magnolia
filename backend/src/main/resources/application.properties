# ─── Perfil ativo ────────────────────────────────────────────────────────────
# Use "dev" para rodar localmente com H2 (sem instalar Postgres)
# Use "prod" para Postgres real
spring.profiles.active=dev

# ─── Servidor ────────────────────────────────────────────────────────────────
server.port=8080

# ─── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Upload de arquivos (fotos de produtos) ───────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ─── Pasta onde as imagens são salvas ────────────────────────────────────────
app.upload.dir=uploads/produtos

# ─── Código de acesso do administrador ───────────────────────────────────────
app.admin.code=1011